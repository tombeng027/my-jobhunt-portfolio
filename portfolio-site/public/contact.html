<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Me</title>
  <link rel="stylesheet" href="./assets/main-4YdyzbIc.css" />
  <style>
    .contact-form-container {
      max-width: 420px;
      margin: 40px auto;
      padding: 2rem;
      background: rgba(255,255,255,0.04);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }
    .contact-form label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    .contact-form input, .contact-form textarea {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 1rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }
    .contact-form button {
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      border: none;
      background: var(--accent, #007bff);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }
    .contact-form button:hover {
      background: var(--heading, #0056b3);
    }
  </style>
</head>
<body>
  <main>
    <div style="max-width:420px;margin:40px auto 0 auto;text-align:left;">
      <a href="/index.html" class="button button-outline" style="margin-bottom:1.5rem;display:inline-block;padding:0.6rem 1.5rem;font-size:1rem;">← Back to Portfolio</a>
    </div>
    <div class="contact-form-container">
      <h2>Contact Me</h2>
      <form class="contact-form" action="https://formspree.io/f/mykbgwnr" method="POST">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required />
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>
        <button type="submit">Send</button>
      </form>
      <p style="font-size:0.95rem;color:#888;margin-top:1rem;">This form is powered by Formspree. No account required for you to test it.</p>
    </div>
  </main>
</body>
</html>
